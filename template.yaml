        NotificationsProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /notifications/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        NotificationsProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /notifications/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        NotificationsProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /notifications/{proxy+}
