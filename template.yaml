AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31

Description: EFI Campus Backend

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures: [arm64]
    Timeout: 10
    MemorySize: 256
    Layers:
      - !Ref EfiLayer
    Environment:
      Variables:
        USERS_TABLE: efi-campus-users
        COURSES_TABLE: efi-campus-courses
        GROUPS_TABLE: efi-campus-groups
        SESSIONS_TABLE: efi-campus-sessions
        INSCRIPTIONS_TABLE: efi-campus-inscriptions
        DICTATIONS_TABLE: efi-campus-dictations
        ATTENDANCE_TABLE: efi-campus-attendance-records
        STRUCTURES_TABLE: efi-campus-structures
        SECTIONS_TABLE: efi-campus-sections
        ITEMS_TABLE: efi-campus-items
        QUESTIONS_TABLE: efi-campus-questions
        ANSWERS_TABLE: efi-campus-answers
        ATTEMPTS_TABLE: efi-campus-attempts
        VISIBILITY_TABLE: efi-campus-visibility-overrides
        NOTIFICATIONS_TABLE: efi-campus-notifications
        REQUIRES_TABLE: efi-campus-requires

Resources:
  # ── Roles ──────────────────────────────────────────────────────────────────

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: efi-campus-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBFullAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource: !Sub arn:aws:dynamodb:us-east-2:${AWS::AccountId}:table/efi-campus-*

  UsersLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: efi-campus-users-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                Resource: !Sub arn:aws:dynamodb:us-east-2:${AWS::AccountId}:table/efi-campus-*
        - PolicyName: CognitoUserManagement
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminDeleteUser
                Resource: !Sub arn:aws:cognito-idp:us-east-2:${AWS::AccountId}:userpool/us-east-2_atPOLyOsJ

  # ── API ─────────────────────────────────────────────────────────────────────

  EfiApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.us-east-2.amazonaws.com/us-east-2_atPOLyOsJ
              audience:
                - 2tlllc6ia4ncv5srnu22fa7qk3
      CorsConfiguration:
        AllowOrigins:
          - https://eficampus.com
          - http://localhost:3000
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowCredentials: true

  # ── Layer ───────────────────────────────────────────────────────────────────

  EfiLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: efi-campus-layer
      ContentUri: layer/
      CompatibleRuntimes: [nodejs22.x]
      CompatibleArchitectures: [arm64]
    Metadata:
      BuildMethod: nodejs22.x
      BuildArchitecture: arm64

  # ── Functions ───────────────────────────────────────────────────────────────
  # ⚠️ CAMBIO CRÍTICO: Se elimina ANY y se declaran métodos explícitos.

  UsersHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: efi-campus-users-handler
      CodeUri: functions/users-handler/
      Handler: index.handler
      Role: !GetAtt UsersLambdaRole.Arn
      Environment:
        Variables:
          USER_POOL_ID: us-east-2_atPOLyOsJ
      Events:
        UsersGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /users
            Auth:
              Authorizer: CognitoAuthorizer
        UsersPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /users
            Auth:
              Authorizer: CognitoAuthorizer
        UsersProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /users/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        UsersProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /users/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        UsersProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /users/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        UsersProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /users/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        UsersProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /users/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer

  CoursesHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: efi-campus-courses-handler
      CodeUri: functions/courses-handler/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        CoursesGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /courses
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /courses
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /courses/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /courses/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /courses/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /courses/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        CoursesProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /courses/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer

  GroupsHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: efi-campus-groups-handler
      CodeUri: functions/groups-handler/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        GroupsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /groups
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /groups
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /groups/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /groups/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /groups/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /groups/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        GroupsProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /groups/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer

  ContentHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: efi-campus-content-handler
      CodeUri: functions/content-handler/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        StructuresProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /structures/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        StructuresProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /structures/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        StructuresProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /structures/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        StructuresProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /structures/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        StructuresProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /structures/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        SectionsProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /sections/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        SectionsProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /sections/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        SectionsProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /sections/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        SectionsProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /sections/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        SectionsProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /sections/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        ItemsProxyGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /items/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        ItemsProxyPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
            Path: /items/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        ItemsProxyPut:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PUT
            Path: /items/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        ItemsProxyPatch:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: PATCH
            Path: /items/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer
        ItemsProxyDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: DELETE
            Path: /items/{proxy+}
            Auth:
              Authorizer: CognitoAuthorizer

  NotificationsHandler:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: efi-campus-notifications-handler
      CodeUri: functions/notifications-handler/
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Events:
        NotificationsGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: GET
            Path: /notifications
            Auth:
              Authorizer: CognitoAuthorizer
        NotificationsPost:
          Type: HttpApi
          Properties:
            ApiId: !Ref EfiApi
            Method: POST
